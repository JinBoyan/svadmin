name: Auto Publish Changed Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/package.json'
      - 'packages/*/src/**'

jobs:
  publish-changed:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure npm for OIDC publishing
        run: |
          echo "npm version: $(npm --version)"
          npm config set //registry.npmjs.org/:_authToken ""
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc

      - name: Detect and publish changed packages
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED_FILES"

          for pkg_dir in packages/*/; do
            pkg_name=$(basename "$pkg_dir")
            if echo "$CHANGED_FILES" | grep -q "packages/$pkg_name/"; then
              PKG_JSON="$pkg_dir/package.json"
              if [ -f "$PKG_JSON" ]; then
                NAME=$(node -p "require('./$PKG_JSON').name")
                LOCAL_VER=$(node -p "require('./$PKG_JSON').version")
                NPM_VER=$(npm view "$NAME" version 2>/dev/null || echo "0.0.0")
                echo "📦 $NAME: local=$LOCAL_VER npm=$NPM_VER"
                if [ "$LOCAL_VER" != "$NPM_VER" ]; then
                  echo "🚀 Publishing $NAME@$LOCAL_VER..."
                  (cd "$pkg_dir" && npm publish --provenance --access public) || echo "⚠️ Publish failed for $NAME"
                else
                  echo "⏭️ $NAME@$LOCAL_VER already on npm, skipping"
                fi
              fi
            fi
          done
